<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luraph Analyzer</title>

<style>

body{
    font-family:sans-serif;
    background:#111;
    color:white;
    padding:20px;
}

textarea{
    width:100%;
    height:300px;
    background:#222;
    color:white;
}

button,select{
    margin-top:10px;
    padding:10px;
}

pre{
    background:#222;
    padding:10px;
}

</style>

</head>


<body>


<h1>Luraph Analyzer</h1>


<select id="version">

<option value="auto">
自動判定
</option>

<option value="v14">
Luraph v14
</option>

<option value="v15">
Luraph v15
</option>

</select>


<br>


<textarea id="code"
placeholder="Luaコードを貼り付け">
</textarea>


<br>


<button onclick="analyze()">
解析
</button>


<h2>結果</h2>

<pre id="result">
待機中
</pre>



<script src="app.js"></script>


</body>

</html>
